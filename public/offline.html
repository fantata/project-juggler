<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Offline · Juggler</title>
    <style>
        :root { color-scheme: light dark; }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1.25rem;
            padding: 2rem;
            text-align: center;
            font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
            background: #FFF8F0;
            color: #42310A;
        }
        @media (prefers-color-scheme: dark) {
            body { background: #161c24; color: #ECE7DD; }
        }
        svg { width: 84px; height: 84px; }
        h1 { font-size: 1.5rem; margin: 0; }
        p { margin: 0; max-width: 22rem; line-height: 1.6; opacity: 0.8; }
        button {
            margin-top: 0.5rem;
            border: 0;
            border-radius: 0.75rem;
            background: #C2714F;
            color: #fff;
            font: inherit;
            font-weight: 600;
            padding: 0.7rem 1.4rem;
            cursor: pointer;
        }
        button:hover { background: #A85A3B; }
    </style>
</head>
<body>
    <svg viewBox="0 0 100 100" aria-hidden="true">
        <path d="M20 70 Q50-10 80 70" fill="none" stroke="#C4AD74" stroke-width="4" stroke-linecap="round"/>
        <circle cx="20" cy="70" r="13" fill="#C2714F"/>
        <circle cx="50" cy="18" r="13" fill="#6B8F71"/>
        <circle cx="80" cy="70" r="13" fill="#8B6914"/>
    </svg>
    <h1>You're offline</h1>
    <p>No connection right now — Juggler needs the network for your latest projects and tasks. We'll be right here when you're back.</p>
    <button onclick="location.reload()">Try again</button>
</body>
</html>
