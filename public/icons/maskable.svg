<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Project Juggler">
  <!-- Full-bleed background; motif kept well within the central safe zone so OS
       masking (circle/squircle) never clips it. -->
  <rect width="512" height="512" fill="#FFF8F0"/>
  <g transform="translate(136 156) scale(2.4)">
    <path d="M20 70 Q50-10 80 70" fill="none" stroke="#C4AD74" stroke-width="4" stroke-linecap="round"/>
    <circle cx="20" cy="70" r="13" fill="#C2714F"/>
    <circle cx="50" cy="18" r="13" fill="#6B8F71"/>
    <circle cx="80" cy="70" r="13" fill="#8B6914"/>
  </g>
</svg>
