name: Deploy to Caprover

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create tarball
        run: tar --exclude='.git' --exclude='node_modules' --exclude='vendor' -cvf deploy.tar .

      - name: Deploy to Caprover
        uses: caprover/deploy-from-github@v1.1.2
        with:
          server: https://captain.sv1.fantata.com
          app: project-juggler
          token: ${{ secrets.CAPROVER_APP_TOKEN }}
